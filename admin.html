<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة | سوق الواحة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Changa:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="container admin-page">
    <header class="admin-header">
      <h1>لوحة إدارة المتجر</h1>
      <div class="admin-actions">
        <a href="./index.html" class="btn ghost">العودة للمتجر</a>
        <button id="logoutBtn" class="btn ghost" type="button">تسجيل خروج</button>
      </div>
    </header>

    <section id="loginSection" class="panel login-panel">
      <h3>دخول الإدارة</h3>
      <p>أدخل بيانات حساب الإدارة للوصول إلى لوحة التحكم.</p>
      <form id="loginForm" class="stack-form">
        <input name="email" type="email" placeholder="البريد الإلكتروني" required />
        <input name="password" type="password" placeholder="كلمة المرور" required />
        <button class="btn primary" type="submit">دخول</button>
      </form>
    </section>

    <section id="dashboardSection" class="admin-content hidden">
      <div class="stats-grid">
        <article class="stat-card">
          <span>عدد المنتجات</span>
          <strong id="productsCount">0</strong>
        </article>
        <article class="stat-card">
          <span>عدد الطلبات</span>
          <strong id="ordersCount">0</strong>
        </article>
        <article class="stat-card">
          <span>إجمالي المبيعات</span>
          <strong id="revenueValue">0 ر.س</strong>
        </article>
      </div>

      <div class="admin-grid">
        <section class="panel">
          <div class="panel-head">
            <h3>إدارة المنتجات</h3>
            <p>إضافة وتعديل وحذف المنتجات.</p>
          </div>

          <form id="productForm" class="stack-form">
            <input type="hidden" name="id" />
            <input name="name" type="text" placeholder="اسم المنتج" required />
            <div class="field-row">
              <input name="price" type="number" min="1" step="1" placeholder="السعر" required />
              <input name="stock" type="number" min="0" step="1" placeholder="المخزون" required />
            </div>
            <input name="category" type="text" placeholder="التصنيف" required />
            <input name="image" type="url" placeholder="رابط صورة المنتج" required />
            <textarea name="description" rows="3" placeholder="وصف المنتج" required></textarea>
            <div class="field-row">
              <button class="btn primary" type="submit">حفظ المنتج</button>
              <button id="resetProductBtn" class="btn ghost" type="button">تفريغ</button>
            </div>
          </form>

          <div id="productsTable" class="table-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h3>إدارة الطلبات</h3>
            <p>تحديث حالة الطلبات الجديدة.</p>
          </div>
          <div id="ordersTable" class="table-list"></div>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./src/admin.js"></script>
</body>
</html>
